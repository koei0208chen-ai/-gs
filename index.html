<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Arcade - 極簡版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 自定義圖示組件 (對應 Lucide)
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [games, setGames] = useState([
                { id: 1, title: '2048 經典版', url: 'https://play2048.co/', type: 'url' },
                { id: 2, title: 'Hextris', url: 'https://hextris.io/', type: 'url' }
            ]);
            
            const [activeGame, setActiveGame] = useState(null);
            const [currentView, setCurrentView] = useState('lobby'); 
            const [password, setPassword] = useState('');
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [showPassPrompt, setShowPassPrompt] = useState(false);
            const [newGame, setNewGame] = useState({ title: '', url: '', file: null, type: 'url' });

            const ADMIN_PASSWORD = "admin123";

            const handleLogin = () => {
                if (password === ADMIN_PASSWORD) {
                    setIsAuthorized(true);
                    setShowPassPrompt(false);
                    setCurrentView('settings');
                    setPassword('');
                } else {
                    alert("密碼錯誤！");
                    setPassword('');
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file && file.type === "text/html") {
                    const blobUrl = URL.createObjectURL(file);
                    setNewGame({ ...newGame, file: file, url: blobUrl, type: 'file' });
                } else {
                    alert("請上傳有效的 HTML 檔案");
                }
            };

            const handleAddGame = (e) => {
                e.preventDefault();
                if (newGame.title && newGame.url) {
                    const id = Date.now();
                    setGames([...games, { 
                        id, 
                        title: newGame.title, 
                        url: newGame.url, 
                        type: newGame.type,
                        fileName: newGame.file ? newGame.file.name : null 
                    }]);
                    setNewGame({ title: '', url: '', file: null, type: 'url' });
                    alert("遊戲新增成功！");
                }
            };

            const deleteGame = (id) => {
                if (confirm("確定要刪除此遊戲嗎？")) {
                    setGames(games.filter(g => g.id !== id));
                }
            };

            const goToLobby = () => {
                setActiveGame(null);
                setCurrentView('lobby');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center sticky top-0 z-10 shadow-xl">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={goToLobby}>
                            <div className="bg-cyan-500 p-2 rounded-lg text-slate-900">
                                <Icon name="gamepad-2" />
                            </div>
                            <h1 className="text-xl font-black tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                                HTML5 Arcade
                            </h1>
                        </div>
                        
                        <div className="flex gap-2">
                            {currentView !== 'lobby' && (
                                <button onClick={goToLobby} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition-all text-sm">
                                    <Icon name="home" size={16} /> 大廳
                                </button>
                            )}
                            <button 
                                onClick={() => isAuthorized ? setCurrentView('settings') : setShowPassPrompt(true)}
                                className={`p-2 rounded-lg transition-all ${currentView === 'settings' ? 'bg-cyan-600' : 'bg-slate-800 hover:bg-slate-700 text-slate-400'}`}
                            >
                                <Icon name="settings" size={20} />
                            </button>
                        </div>
                    </nav>

                    <main className="p-6 max-w-7xl mx-auto flex-1 w-full">
                        {currentView === 'lobby' && (
                            <div className="animate-fade-in">
                                <div className="mb-10">
                                    <h2 className="text-3xl font-bold mb-2">我的遊戲庫</h2>
                                    <div className="h-1 w-20 bg-cyan-500 rounded-full"></div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {games.map((game) => (
                                        <div key={game.id} onClick={() => { setActiveGame(game); setCurrentView('play'); }} className="group relative bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-cyan-500/50 transition-all cursor-pointer shadow-2xl hover:-translate-y-2">
                                            <div className="aspect-video relative overflow-hidden bg-slate-800">
                                                <div className="absolute inset-0 z-[1] bg-slate-900/40 group-hover:bg-transparent transition-colors"></div>
                                                <iframe src={game.url} className="w-full h-full border-0 pointer-events-none scale-90 opacity-80 group-hover:opacity-100 group-hover:scale-100 transition-all duration-500" scrolling="no" />
                                                <div className="absolute bottom-4 left-4 z-[2] bg-cyan-600 px-3 py-1 rounded text-xs font-bold uppercase">{game.type === 'file' ? '本地檔案' : '外部連結'}</div>
                                            </div>
                                            <div className="p-5 flex justify-between items-center">
                                                <h3 className="font-bold text-xl group-hover:text-cyan-400">{game.title}</h3>
                                                <Icon name="maximize-2" className="text-slate-400" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentView === 'settings' && (
                            <div className="max-w-2xl mx-auto animate-fade-in">
                                <div className="flex justify-between items-end mb-8">
                                    <h2 className="text-3xl font-bold">管理控制台</h2>
                                    <button onClick={() => setIsAuthorized(false)} className="text-red-400 text-sm hover:underline">登出</button>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl mb-8">
                                    <form onSubmit={handleAddGame} className="space-y-6">
                                        <input type="text" required value={newGame.title} onChange={(e) => setNewGame({...newGame, title: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500" placeholder="遊戲名稱" />
                                        <div className="flex bg-slate-950 p-1 rounded-xl">
                                            <button type="button" onClick={() => setNewGame({...newGame, type: 'url'})} className={`flex-1 py-2 rounded-lg ${newGame.type === 'url' ? 'bg-slate-800 text-cyan-400' : 'text-slate-500'}`}>網址</button>
                                            <button type="button" onClick={() => setNewGame({...newGame, type: 'file'})} className={`flex-1 py-2 rounded-lg ${newGame.type === 'file' ? 'bg-slate-800 text-cyan-400' : 'text-slate-500'}`}>上傳</button>
                                        </div>
                                        {newGame.type === 'url' ? (
                                            <input type="url" required value={newGame.url} onChange={(e) => setNewGame({...newGame, url: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 outline-none" placeholder="https://..." />
                                        ) : (
                                            <div className="border-2 border-dashed border-slate-800 rounded-xl p-8 text-center relative">
                                                <input type="file" accept=".html" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                                                <Icon name="upload" className="mx-auto mb-2 text-slate-500" />
                                                <p className="text-sm text-slate-400">{newGame.file ? newGame.file.name : "選擇 HTML 檔案"}</p>
                                            </div>
                                        )}
                                        <button type="submit" className="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-bold shadow-lg">確認新增</button>
                                    </form>
                                </div>
                                <div className="space-y-3">
                                    {games.map(g => (
                                        <div key={g.id} className="bg-slate-900 p-4 rounded-xl flex justify-between items-center border border-slate-800">
                                            <div className="flex items-center gap-3">
                                                <Icon name={g.type === 'file' ? 'upload' : 'link'} size={18} className="text-cyan-400" />
                                                <span className="font-bold">{g.title}</span>
                                            </div>
                                            <button onClick={() => deleteGame(g.id)} className="text-slate-500 hover:text-red-400 transition-colors"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentView === 'play' && activeGame && (
                            <div className="fixed inset-0 z-50 bg-black flex flex-col">
                                <div className="bg-slate-900 p-3 flex justify-between items-center">
                                    <button onClick={goToLobby} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold">
                                        <Icon name="home" size={16} /> 返回大廳
                                    </button>
                                    <h2 className="text-lg font-bold text-cyan-400">{activeGame.title}</h2>
                                    <div className="w-20"></div>
                                </div>
                                <iframe src={activeGame.url} className="flex-1 w-full border-0 bg-white" allow="autoplay; fullscreen; pointer-lock" />
                            </div>
                        )}
                    </main>

                    {showPassPrompt && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 w-full max-w-sm text-center">
                                <Icon name="lock" size={32} className="mx-auto mb-6 text-cyan-400" />
                                <h3 className="text-2xl font-bold mb-6">身分驗證</h3>
                                <input type="password" autoFocus value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleLogin()} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 mb-4 text-center" placeholder="輸入密碼..." />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowPassPrompt(false)} className="flex-1 bg-slate-800 py-3 rounded-xl">取消</button>
                                    <button onClick={handleLogin} className="flex-1 bg-cyan-600 py-3 rounded-xl font-bold">登入</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
